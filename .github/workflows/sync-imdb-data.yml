name: Sync IMDb Data

"on":
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Fetch ratings and watchlist
        env:
          IMDB_EMAIL:    ${{ secrets.IMDB_EMAIL }}
          IMDB_PASSWORD: ${{ secrets.IMDB_PASSWORD }}
        run: python src/main.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ratings.csv data/watchlist.csv
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "sync: update IMDb data $(date '+%Y-%m-%d')"
          git push

name: 1 - Trigger IMDb Exports

"on":
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: playwright install chromium && playwright install-deps chromium
      - name: Trigger export generation
        env:
          IMDB_COOKIES: ${{ secrets.IMDB_COOKIES }}
        run: python src/trigger_exports.py

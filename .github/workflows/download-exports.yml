name: 2 - Download IMDb Exports

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: playwright install chromium && playwright install-deps chromium
      - name: Download latest exports
        env:
          IMDB_COOKIES: ${{ secrets.IMDB_COOKIES }}
        run: python src/main.py
      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ratings.csv data/watchlist.csv
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "sync: update IMDb data $(date '+%Y-%m-%d')"
          git push
